<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hobbies</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-content hobbies">
      <h1>My Hobbies</h1>

      <!-- Hobbies List -->
      <section class="hobbies-list">
        <h2>Things I Enjoy</h2>
        <ul>
          <li>Reading science fiction novels</li>
          <li>Playing football with friends</li>
          <li>Experimenting with new recipes</li>
          <li>Listening to podcasts about technology</li>
          <li>Traveling and exploring new places</li>
        </ul>
      </section>

      <!-- YouTube Video Snippet -->
      <section class="youtube-video">
        <h2>Favorite TV Show Snippet</h2>
        <iframe
          width="560"
          height="315"
          src="https://www.youtube.com/embed/YOUR_VIDEO_ID"
          title="YouTube video player"
          frameborder="0"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
          allowfullscreen
        >
        </iframe>
      </section>

      <!-- Spotify Embed Player -->
      <section class="spotify-player">
        <h2>Favorite Song</h2>
        <iframe
          src="https://open.spotify.com/embed/track/YOUR_TRACK_ID"
          width="300"
          height="380"
          frameborder="0"
          allowtransparency="true"
          allow="encrypted-media"
        >
        </iframe>
      </section>
    </div>
  </body>
</html>
