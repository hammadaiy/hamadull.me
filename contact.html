<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hamad’s Portfolio</title>
    <link rel="icon" href="favicon.png" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Merriweather+Sans:ital,wght@0,300..800;1,300..800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <div class="grid-contact-container">
      <!--Navbar/Header Start -->
      <header class="header">
        <div class="logo">
          <span>HAMAD</span>
          <span>ULLAH</span>
        </div>
        <ul class="header-links">
          <li><a href="./">HOME</a></li>
          <li><a href="./cv">CV</a></li>
          <li><a href="./hobbies">HOBBIES</a></li>
          <li><a href="./contact">CONTACT</a></li>
        </ul>
        <svg
          id="hamburger"
          class="Header__toggle-svg"
          viewbox="0 0 60 40"
          onclick="toggleMenu()"
        >
          <g
            stroke="#565449"
            stroke-width="4"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path id="top-line" d="M10,10 L50,10 Z"></path>
            <path id="middle-line" d="M10,20 L50,20 Z"></path>
            <path id="bottom-line" d="M10,30 L50,30 Z"></path>
          </g>
        </svg>
      </header>
      <!--Navbar/Header End -->

      <div class="container-contact">
        <h1 class="mt-4 mb-3">Contact Me!</h1>
        <div class="sub-container">
          <div class="row mt-4">
            <div class="col-md-8">
              <div class="card-1">
                <div class="card-body">
                  <h2 class="card-title">Connect with Me!</h2>
                  <div class="social-icons">
                    <a href="https://github.com/hammadaiy" target="_blank">
                      <img src="github.png" alt="GitHub" />
                    </a>

                    <a href="https://linkedin.com/in/hammadaiy" target="_blank">
                      <img src="linkedin.png" alt="LinkedIn" />
                    </a>
                    <a href="https://instagram.com/hammadaiy" target="_blank">
                      <img src="instagram.png" alt="Instagram" />
                    </a>
                    <a
                      href="https://www.threads.net/@hammadaiy"
                      target="_blank"
                    >
                      <img src="threads.png" alt="Threads" />
                    </a>
                    <a
                      href="https://www.pinterest.com/hammadaiy/"
                      target="_blank"
                    >
                      <img src="pinterest.png" alt="Pinterest" />
                    </a>
                  </div>
                </div>
              </div>
            </div>
          </div>
          <div class="row">
            <div class="col-md-8">
              <div class="card">
                <div class="card-body">
                  <form action="https://api.web3forms.com/submit" method="POST">
                    <div class="form-group">
                      <input
                        type="hidden"
                        name="access_key"
                        value="a4c71a06-7f22-4ed7-9b82-b2e2f8b8e4c2"
                      />
                      <label class="font-weight-bold" for="name">* Name</label>
                      <input
                        class="form-control"
                        type="text"
                        name="name"
                        placeholder="Enter Your Full Name"
                        required
                      />
                    </div>
                    <div class="form-group">
                      <label class="font-weight-bold" for="number">Age</label>
                      <input
                        class="form-control"
                        type="number"
                        name="Age"
                        placeholder="Enter Your age"
                      />
                    </div>
                    <div class="form-group">
                      <label class="font-weight-bold" for="email"
                        >* Email</label
                      >
                      <input
                        class="form-control"
                        type="email"
                        name="email"
                        placeholder="Enter Your Email"
                        required
                      />
                    </div>
                    <div class="form-group">
                      <label class="font-weight-bold" for="bio"
                        >* Message</label
                      >
                      <textarea
                        class="form-control"
                        name="Message"
                        id=""
                        cols="30"
                        rows="5"
                        placeholder="Write a message"
                        spellcheck="true"
                        required
                      ></textarea>
                    </div>
                    <div class="form-group">
                      <label class="font-weight-bold" for="source"
                        >How did you find out about me?</label
                      >
                      <select class="form-control" name="source" id="source">
                        <option value="" disabled selected>Choose one</option>
                        <option value="google">Google</option>
                        <option value="friend">From a friend</option>
                        <option value="linkedin">From LinkedIn</option>
                        <option value="other">Other</option>
                      </select>
                    </div>
                    <button type="submit">Submit Form</button>
                  </form>
                </div>
              </div>
            </div>
          </div>
        </div>
        <img class="arroww" src="arroww.svg" alt="arrow" />
      </div>
    </div>
    <script src="script.js"></script>
  </body>
</html>
